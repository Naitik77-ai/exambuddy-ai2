<!DOCTYPE html>
<html>
<head>
  <title>ExamBuddy AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .dashboard {
      display: none;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      position: fixed;
      padding: 20px;
    }

    .sidebar h3 {
      margin-bottom: 20px;
    }

    .sidebar p {
      cursor: pointer;
      margin: 10px 0;
    }

    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      width: 220px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="login-box">
    <h2>ExamBuddy AI</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="sidebar">
    <h3>Subjects</h3>
    <p>📘 Accounting</p>
    <p>📗 Business Law</p>
    <p>📄 PYQs</p>

    <br><br>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <h1>Dashboard</h1>

    <div class="cards">
      <div class="card">
        <h3>Accounting Notes</h3>
        <a href="notes/accounting.pdf" target="_blank">
          <button>View Notes</button>
        </a>
      </div>

      <div class="card">
        <h3>Business Law Notes</h3>
        <a href="notes/law.pdf" target="_blank">
          <button>View Notes</button>
        </a>
      </div>

      <div class="card">
        <h3>PYQs</h3>
        <a href="pyqs/2023.pdf" target="_blank">
          <button>View PYQs</button>
        </a>
      </div>
    </div>
  </div>

</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email && password){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Please enter email & password");
  }
}

function logout() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginPage").style.display = "flex";
}
</script>

</body>
</html>
